<style>
.bioelectric-hero {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #020608;
}

.bioelectric-hero canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.bioelectric-hero .noise-overlay {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
}

.bioelectric-hero .vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(2,6,8,0.5) 100%);
  pointer-events: none;
}
</style>

<div class="bioelectric-hero">
  <canvas id="bioelectric-canvas"></canvas>
  <div class="noise-overlay"></div>
  <div class="vignette"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6.0.4"></script>
<script>
  if (typeof d3 === 'undefined' || !d3.Delaunay) {
    console.error('BioElectric: d3-delaunay failed to load from CDN');
  }
</script>
<script src="./bioelectric-core.js"></script>
<script>
(function() {
  const canvas = document.getElementById('bioelectric-canvas');
  const animation = createBioElectricAnimation(canvas, { useContainerSize: true });
  // To stop: animation.stop();
  // To restart: animation.start();
})();
</script>
